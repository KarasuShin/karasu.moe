name: Check

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Build
        run: vp build
