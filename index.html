<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121312" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Karasu 的个人主页：代码、终端、漫画与一些解决真实问题的小工具。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="鸦巢 — Karasu" />
    <meta property="og:description" content="技术宅拯救世界。" />
    <meta property="og:url" content="https://karasu.moe" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      rel="preload"
      as="image"
      href="/assets/raven.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-bold.css"
    />
    <title>鸦巢 — Karasu</title>
    <script>
      ;(() => {
        const savedTheme = localStorage.getItem('karasu-theme')
        document.documentElement.dataset.theme =
          savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
